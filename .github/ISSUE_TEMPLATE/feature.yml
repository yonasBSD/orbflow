name: Feature Request
description: Suggest a new feature or improvement for Orbflow
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the feature and the problem it solves.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is it related to a frustration?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like. Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Orbflow does this relate to?
      options:
        - Backend (Rust)
        - Frontend (Web UI)
        - Engine (Workflow execution)
        - API (HTTP/gRPC)
        - Built-in Nodes
        - Plugin System
        - Infrastructure
        - Documentation
        - New Component
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: How many users would benefit from this feature?
      options:
        - Low (nice to have)
        - Medium (improves workflow for some users)
        - High (broadly useful or unblocks key use cases)
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, screenshots, or references.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and discussions to ensure this is not a duplicate.
          required: true
        - label: I am willing to contribute this feature via a pull request.
          required: false
