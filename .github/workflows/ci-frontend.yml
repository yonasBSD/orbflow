name: Frontend CI

on:
  push:
    branches: [main]
    paths: ["apps/**", "packages/**", "pnpm-lock.yaml"]
  pull_request:
    paths: ["apps/**", "packages/**", "pnpm-lock.yaml"]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@fe02b34f77f8bc703a0f6b7b0e4aab7a8de7eac2 # v4.0.0
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642195f572a2b2b8a0db14a # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r run lint
      - run: pnpm -r run test --if-present
      - run: pnpm -r run build
