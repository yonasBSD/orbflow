name: Coverage

on:
  push:
    branches: [main]
    paths: ["crates/**", "Cargo.toml", "Cargo.lock", ".github/workflows/coverage.yml"]
  pull_request:
    paths: ["crates/**", "Cargo.toml", "Cargo.lock", ".github/workflows/coverage.yml"]

permissions:
  contents: read

jobs:
  rust-coverage:
    name: Rust Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage
        run: cargo tarpaulin --workspace --out xml --output-dir coverage --timeout 300 --skip-clean

      - name: Upload to Codecov
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67ab1fd00d3ead9 # v5.4.3
        with:
          files: coverage/cobertura.xml
          flags: rust
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
