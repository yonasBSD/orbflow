name: Security Audit

on:
  push:
    branches: [main]
    paths: ["Cargo.lock", "Cargo.toml", "crates/**/Cargo.toml", ".github/workflows/security-audit.yml"]
  pull_request:
    paths: ["Cargo.lock", "Cargo.toml", "crates/**/Cargo.toml", ".github/workflows/security-audit.yml"]
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC

permissions:
  checks: write
  contents: read

jobs:
  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # sqlx 0.8 macros still pull sqlx-mysql transitively, which brings in
          # rsa 0.9.10 even though this workspace is PostgreSQL-only.
          ignore: RUSTSEC-2023-0071
